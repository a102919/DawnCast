# DawnCast 本機開發用 docker-compose（單人精簡版）
# 四容器：api / worker / db / gotrue（無 Kong、無 backup sidecar）
#
# 啟動順序：
#   1. cp backend/.env.example backend/.env，編 POSTGRES_PASSWORD / GOTRUE_JWT_KEY / GOOGLE_* / MINIMAX / R2
#   2. cd backend && docker compose up -d
#   3. 首次跑 migrations：
#      docker compose run --rm migrate
#      之後 entrypoint-api.sh / entrypoint-worker.sh 會自動跑冪等
#
# 不需 Kong：FastAPI 8080 對 localhost 直開、本機 vite proxy /api 跟 /auth 轉過去即可。

services:
  db:
    image: supabase/postgres:17.6.1.136
    restart: unless-stopped
    environment:
      POSTGRES_USER: supabase_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
      POSTGRES_DB: postgres
      TZ: Asia/Taipei
      PGTZ: Asia/Taipei
    ports:
      - "127.0.0.1:54322:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supabase_admin -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  gotrue:
    image: supabase/gotrue:v2.189.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:5173}
      GOTRUE_URI_ALLOW_LIST: ${URI_ALLOW_LIST:-http://localhost:5173,http://localhost:8080/auth/v1/callback}
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI: ${GOTRUE_REDIRECT_URI:-http://localhost:8080/auth/v1/callback}
      GOTRUE_JWT_KEY: ${GOTRUE_JWT_KEY:?run deploy/scripts/sign-jwt-key.sh first}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_DISABLE_EMAIL_SIGNUP: "true"
      GOTRUE_DISABLE_EMAIL_LINKUP: "true"
      GOTRUE_DISABLE_EMAIL_MAGICLINK: "true"
      GOTRUE_DISABLE_EMAIL_OTP: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_HOST: ""
      PORT: "9999"
    ports:
      - "127.0.0.1:9999:9999"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      gotrue:
        condition: service_started
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      PORT: "8080"
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL:-http://localhost:8080/auth/v1/.well-known/jwks.json}
      SUPABASE_JWT_AUDIENCE: authenticated
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-["http://localhost:5173"]}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-true}
      DEV_USER_ID: ${DEV_USER_ID:-00000000-0000-0000-0000-000000000001}
      API_KEY: ${MINIMAX_API_KEY:-}
      API_BASE_URL: ${API_BASE_URL:-https://api.minimax.io/anthropic}
      API_MODEL: ${API_MODEL:-MiniMax-M3}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-dawncast}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      # entrypoint 跑 migrations 用
      POSTGRES_USER: supabase_admin
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      APPLY_MIGRATIONS_ON_BOOT: ${APPLY_MIGRATIONS_ON_BOOT:-1}
    ports:
      - "127.0.0.1:8080:8080"
    # 同 network 連 gotrue:9999；前端 vite proxy /auth → http://localhost:8080/auth → 這裡反代
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-prod}
      APP_TIMEZONE: Asia/Taipei
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      GENERATION_ENGINE: api_key
      FAILOVER_MODE: degrade
      API_KEY: ${MINIMAX_API_KEY:-}
      API_BASE_URL: ${API_BASE_URL:-https://api.minimax.io/anthropic}
      API_MODEL: ${API_MODEL:-MiniMax-M3}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-dawncast}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      POSTGRES_USER: supabase_admin
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      APPLY_MIGRATIONS_ON_BOOT: ${APPLY_MIGRATIONS_ON_BOOT:-1}

  # 一次性 migration runner（給 CI/手動）
  #   docker compose run --rm migrate
  migrate:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_USER: supabase_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    entrypoint: ["python", "-m", "scripts.apply_migrations"]

volumes:
  db-data:
