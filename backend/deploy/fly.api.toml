# ── Fly.io：DawnCast API（FastAPI 對外服務）────────────────────────────
# 有對外 port、跑 http service。可隨流量 auto stop/start，但保底 1 台常駐
# 避免冷啟動讓使用者等。部署：fly deploy -c deploy/fly.api.toml

app = "dawncast-api"
primary_region = "nrt"          # 東京，離台灣使用者最近

[build]
  dockerfile = "Dockerfile.api"
  # build context 設在 backend/（dockerfile 路徑相對此 toml 所在目錄）

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080          # 對齊 Dockerfile EXPOSE / uvicorn 綁的 port
  force_https = true
  auto_stop_machines = "stop"   # 無流量縮機省錢
  auto_start_machines = true    # 有請求自動拉起
  min_machines_running = 1       # 保底 1 台，避免冷啟動延遲

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 100

# Fly 平台層健康檢查。app/main.py 已提供 GET /health（回 {"status":"ok"}）。
[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  timeout = "5s"
  method = "get"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"             # API 純 I/O，記憶體需求低
