# ── Fly.io：DawnCast Worker（常駐生成）─────────────────────────────────
# 無對外 port → 不設 [http_service]。常駐 poll 工作佇列，必須一直活著，
# 所以 auto_stop=false、保底 1 台。掛了由 Fly on-failure 重啟，
# 加上 PRD §6 的 03:30 evergreen 兜底，單點故障可接受（見 README）。
# 部署：fly deploy -c deploy/fly.worker.toml

app = "dawncast-worker"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.worker"

# worker 不讀對外 port；DB / R2 / 引擎金鑰全走 fly secrets。
[env]
  GENERATION_ENGINE = "api_key"   # 預設 fallback 引擎；切引擎用 fly secrets 蓋
  FAILOVER_MODE = "degrade"

# 常駐單一 process。不設 http service，Fly 不會對它做 TCP/HTTP 健康檢查；
# 容器健康靠 Dockerfile 內的 HEALTHCHECK（跑 healthcheck.py）。
[processes]
  worker = "python -m engine.worker"

[[vm]]
  size = "shared-cpu-2x"          # ffmpeg 合成吃 CPU，給寬一點
  memory = "1024mb"               # 音檔 + 字幕合成需要記憶體餘裕
  processes = ["worker"]

# 重啟策略：失敗才重啟（不是正常結束就拉起），避免 crash loop 燒資源。
[[restart]]
  policy = "on-failure"
  max_retries = 5

# 關鍵：worker 必須一直在跑。
#   - auto_stop_machines = false：絕不因「閒置」被縮掉（它本來就在 poll）。
#   - min_machines_running = 1：永遠保 1 台。
# 注意：這兩項在無 http_service 時，實務上以 `fly scale count 1` +
# 部署時不開 autostop 為準；此處宣告意圖，部署步驟見 README。
[deploy]
  strategy = "rolling"            # 滾動更新，新機起來再換下舊機
