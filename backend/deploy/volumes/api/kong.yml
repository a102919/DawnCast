# DawnCast Kong 宣告式設定
# 只對外暴露 Supabase Auth 路由（/auth/v1/...）跟 JWKS。
# Frontend 透過 HTTPS 取得 JWT，反向驗證時透過 JWKS 取公鑰。
# Backend FastAPI 透過 Kong 跟 GoTrue 內網互連（無需路由）。
#
# 對應 supabase/supabase docker/volumes/api/kong.yml（精簡版：
#   移除 rest/realtime/storage/edge/meta 對應 routes）

_format_version: "2.1"
services:
  # GoTrue 對外接口
  - name: auth
    url: http://gotrue:9999/
    routes:
      # OAuth 流程 + 公開元數據（anonymous 可訪問）
      - name: auth-open
        paths:
          - /auth/v1/authorize
          - /auth/v1/callback
          - /auth/v1/verify
          - /auth/v1/.well-known/jwks.json
          - /auth/v1/.well-known/openid-configuration
          - /auth/v1/sso/saml/acs
          - /auth/v1/sso/saml/metadata
        plugins:
          - name: cors
          - name: key-auth
            config:
              key_names:
                - apikey
                - Authorization
          - name: acl
            config:
              allow:
                - anon
                - service_role

  # OAuth discovery（前端用）
  - name: oauth-discovery
    url: http://gotrue:9999/
    routes:
      - name: oauth
        paths:
          - /.well-known/oauth-authorization-server
