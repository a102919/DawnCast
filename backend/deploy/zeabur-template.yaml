# Zeabur Server Marketplace 部署模板（DawnCast — 單人精簡版，四容器）
# Schema: zeabur.com/v1, services[].template = PREBUILT|GIT
# 對應 spec.source.{image|{type,repoID,branch}}, ports[].{id,port,type},
# volumes[].{id,dir}, env 物件（map）。
#
# 跑 deploy：
#   zeabur template deploy --file deploy/zeabur-template.yaml --project-id <id> --interactive=false

apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: dawncast-personal

spec:
  variables:
    - key: POSTGRES_PASSWORD
      type: STRING
      name: PostgreSQL Password
      description: 主 PostgreSQL 密碼（後端、GoTrue、migration runner 共用）

  resourceRequirement:
    recommendedConfig:
      cpu: 2
      ram: 4

  services:
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 1. Postgres（supabase 官方 image，預裝三個 ext）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: db
      template: PREBUILT
      spec:
        source:
          image: supabase/postgres:17.6.1.136
        env:
          POSTGRES_USER:
            default: supabase_admin
          POSTGRES_PASSWORD:
            default: ${POSTGRES_PASSWORD}
          POSTGRES_DB:
            default: postgres
          TZ:
            default: Asia/Taipei
          PGTZ:
            default: Asia/Taipei
        volumes:
          - id: pgdata
            dir: /var/lib/postgresql/data
        ports:
          - id: postgres
            port: 5432
            type: TCP

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 2. GoTrue（自架 Supabase Auth）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: gotrue
      template: PREBUILT
      dependencies:
        - db
      spec:
        source:
          image: supabase/gotrue:v2.189.0
        env:
          GOTRUE_DB_DRIVER:
            default: postgres
          GOTRUE_DB_DATABASE_URL:
            default: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
          GOTRUE_SITE_URL:
            default: https://dawncast.app
          GOTRUE_URI_ALLOW_LIST:
            default: https://dawncast.app,http://localhost:5173,http://localhost:8080/auth/v1/callback
          GOTRUE_EXTERNAL_GOOGLE_ENABLED:
            default: "true"
          GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID:
            default: ""
          GOTRUE_EXTERNAL_GOOGLE_SECRET:
            default: ""
          GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI:
            default: https://api.dawncast.app/auth/v1/callback
          GOTRUE_JWT_KEY:
            default: ""
          GOTRUE_JWT_AUD:
            default: authenticated
          GOTRUE_JWT_EXP:
            default: "3600"
          GOTRUE_DISABLE_EMAIL_SIGNUP:
            default: "true"
          GOTRUE_DISABLE_EMAIL_LINK_SIGNUP:
            default: "true"
          GOTRUE_DISABLE_EMAIL_MAGICLINK:
            default: "true"
          GOTRUE_DISABLE_EMAIL_OTP:
            default: "true"
          GOTRUE_MAILER_AUTOCONFIRM:
            default: "true"
          GOTRUE_SMTP_HOST:
            default: ""
          PORT:
            default: "9999"
        ports:
          - id: http
            port: 9999
            type: TCP

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 3. API（FastAPI / Dockerfile.api）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: api
      template: GIT
      dependencies:
        - db
        - gotrue
      spec:
        # 用 Zeabur zbpack 自動 build（Python + Dockerfile 自動偵測）
        # 如果 zbpack 不認，會直接 git clone 後跑 Dockerfile.api
        source:
          # Zeabur 認 format 不同，try 1: 直接 repo URL
          type: GITHUB
          repoURL: https://github.com/Alan047/DawnCast
          branch: main
        env:
          ENVIRONMENT:
            default: prod
          PORT:
            default: "8080"
          DATABASE_URL:
            default: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
          SUPABASE_JWKS_URL:
            default: https://api.dawncast.app/auth/v1/.well-known/jwks.json
          SUPABASE_JWT_AUDIENCE:
            default: authenticated
          CORS_ALLOWED_ORIGINS:
            default: https://dawncast.app
          ADMIN_TOKEN:
            default: ""
          GENERATION_ENGINE:
            default: api_key
          FAILOVER_MODE:
            default: degrade
          API_KEY:
            default: ""
          API_BASE_URL:
            default: https://api.minimax.io/anthropic
          API_MODEL:
            default: MiniMax-M2.5
          R2_ACCOUNT_ID:
            default: ""
          R2_ACCESS_KEY_ID:
            default: ""
          R2_SECRET_ACCESS_KEY:
            default: ""
          R2_BUCKET:
            default: dawncast
          R2_ENDPOINT:
            default: ""
          TAVILY_API_KEY:
            default: ""
          APPLY_MIGRATIONS_ON_BOOT:
            default: "1"
          POSTGRES_USER:
            default: supabase_admin
          POSTGRES_HOST:
            default: db
          POSTGRES_PORT:
            default: "5432"
          POSTGRES_DB:
            default: postgres
        ports:
          - id: http
            port: 8080
            type: HTTP

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 4. Worker（常駐；Dockerfile.worker）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: worker
      template: GIT
      dependencies:
        - db
        - api
      spec:
        source:
          type: GITHUB
          repoID: "REPLACE_WITH_REPO_ID"
          branch: main
        env:
          ENVIRONMENT:
            default: prod
          APP_TIMEZONE:
            default: Asia/Taipei
          DATABASE_URL:
            default: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
          GENERATION_ENGINE:
            default: api_key
          FAILOVER_MODE:
            default: degrade
          API_KEY:
            default: ""
          API_BASE_URL:
            default: https://api.minimax.io/anthropic
          API_MODEL:
            default: MiniMax-M2.5
          R2_ACCOUNT_ID:
            default: ""
          R2_ACCESS_KEY_ID:
            default: ""
          R2_SECRET_ACCESS_KEY:
            default: ""
          R2_BUCKET:
            default: dawncast
          R2_ENDPOINT:
            default: ""
          APPLY_MIGRATIONS_ON_BOOT:
            default: "1"
          POSTGRES_USER:
            default: supabase_admin
          POSTGRES_HOST:
            default: db
          POSTGRES_PORT:
            default: "5432"
          POSTGRES_DB:
            default: postgres
        # 無對外 port；常駐 process 由 Dockerfile.worker 的 CMD 啟動
