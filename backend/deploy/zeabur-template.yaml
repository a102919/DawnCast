# Zeabur Server Marketplace 部署模板（DawnCast — 單人精簡版，四容器）
# Schema: zeabur.com/v1, services[].template = PREBUILT|GIT
# 對應 spec.source.{image|{type,repoID,branch}}, ports[].{id,port,type},
# volumes[].{id,dir}, env 物件（map）。
#
# 跑 deploy：
#   zeabur template deploy --file deploy/zeabur-template.yaml --project-id <id> --interactive=false

apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: dawncast-personal

spec:
  variables:
    - key: POSTGRES_PASSWORD
      type: STRING
      name: PostgreSQL Password
      description: 主 PostgreSQL 密碼（後端、GoTrue、migration runner 共用）

  resourceRequirement:
    recommendedConfig:
      cpu: 2
      ram: 4

  services:
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 1. Postgres（supabase 官方 image，預裝三個 ext）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: db
      template: PREBUILT
      spec:
        source:
          image: supabase/postgres:17.6.1.136
        env:
          POSTGRES_USER:
            default: supabase_admin
          POSTGRES_PASSWORD:
            default: ${POSTGRES_PASSWORD}
          POSTGRES_DB:
            default: postgres
          TZ:
            default: Asia/Taipei
          PGTZ:
            default: Asia/Taipei
        volumes:
          - id: pgdata
            dir: /var/lib/postgresql/data
        ports:
          - id: postgres
            port: 5432
            type: TCP

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 2. GoTrue（自架 Supabase Auth）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: gotrue
      template: PREBUILT
      dependencies:
        - db
      spec:
        source:
          image: supabase/gotrue:v2.189.0
        env:
          GOTRUE_DB_DRIVER:
            default: postgres
          GOTRUE_DB_DATABASE_URL:
            default: postgres://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/postgres
          API_EXTERNAL_URL:
            default: https://auth.dawncast.app
          GOTRUE_API_EXTERNAL_URL:
            default: https://auth.dawncast.app
          GOTRUE_SITE_URL:
            default: https://dawncast.app
          GOTRUE_URI_ALLOW_LIST:
            default: https://dawncast.app,http://localhost:5173,http://localhost:8080/auth/v1/callback
          GOTRUE_DISABLE_SIGNUP:
            default: "true"
          GOTRUE_EXTERNAL_GOOGLE_ENABLED:
            default: "true"
          GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID:
            default: ""
          GOTRUE_EXTERNAL_GOOGLE_SECRET:
            default: ""
          GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI:
            default: https://auth.dawncast.app/auth/v1/callback
          GOTRUE_JWT_KEY:
            default: ""
          GOTRUE_JWT_AUD:
            default: authenticated
          GOTRUE_JWT_EXP:
            default: "3600"
          GOTRUE_DISABLE_EMAIL_SIGNUP:
            default: "true"
          GOTRUE_DISABLE_EMAIL_LINK_SIGNUP:
            default: "true"
          GOTRUE_DISABLE_EMAIL_MAGICLINK:
            default: "true"
          GOTRUE_DISABLE_EMAIL_OTP:
            default: "true"
          GOTRUE_MAILER_AUTOCONFIRM:
            default: "true"
          GOTRUE_SMTP_HOST:
            default: ""
          PORT:
            default: "9999"
        ports:
          - id: http
            port: 9999
            type: TCP

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 3. API（FastAPI / Dockerfile.api）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: api
      template: GIT
      dependencies:
        - db
        - gotrue
      spec:
        source:
          source: GITHUB
          repo: 1307825216
          branch: main
          rootDirectory: backend
          # Zeabur 對 git source 的 dockerfile 欄位是 inline content（不是路徑）；
          # 留空字串會走 zbpack，於是直接把 backend/deploy/Dockerfile.api 內聯進來。
          dockerfile: |
            # ── DawnCast API（FastAPI / uvicorn）───────────────────────────────────
            # 對外服務層。不碰媒體處理，所以「不裝 ffmpeg、不裝中文字型」——
            # 那些只有 worker 燒字幕時才需要，API 裝了只是讓 image 變肥、攻擊面變大。
            #
            # build context 為 backend/：所有 COPY 路徑相對 backend/。

            # ---- builder：用 uv 把依賴裝進 image 內的 .venv ----
            FROM python:3.12-slim AS builder

            # uv 官方靜態 binary，免在 image 裡裝 pip/curl
            COPY --from=ghcr.io/astral-sh/uv:latest /uv /uvx /bin/

            ENV UV_COMPILE_BYTECODE=1 \
                UV_LINK_MODE=copy \
                UV_PYTHON_DOWNLOADS=0

            WORKDIR /app

            # 先只 COPY 依賴定義 → 鎖檔，命中 layer cache。
            COPY pyproject.toml uv.lock ./
            RUN uv sync --frozen --no-dev --no-install-project

            COPY app ./app
            COPY engine ./engine
            COPY shared ./shared
            RUN uv sync --frozen --no-dev

            RUN uv run python -m piper.download_voices --download-dir /app/voices en_US-amy-medium

            # ---- runtime：乾淨小 image，只搬 .venv 與原始碼 ----
            FROM python:3.12-slim AS runtime

            RUN useradd --create-home --uid 10001 appuser
            WORKDIR /app

            ENV PATH="/app/.venv/bin:$PATH" \
                PYTHONUNBUFFERED=1 \
                PYTHONDONTWRITEBYTECODE=1 \
                PORT=8080 \
                PIPER_VOICE_MODEL=/app/voices/en_US-amy-medium.onnx

            COPY --from=builder --chown=appuser:appuser /app/.venv ./.venv
            COPY --from=builder --chown=appuser:appuser /app/app ./app
            COPY --from=builder --chown=appuser:appuser /app/engine ./engine
            COPY --from=builder --chown=appuser:appuser /app/shared ./shared
            COPY --from=builder --chown=appuser:appuser /app/voices ./voices

            COPY --chown=appuser:appuser scripts ./scripts

            USER appuser
            EXPOSE 8080

            # ponytail: 啟動時由 app/main.py lifespan event 跑 migrations（idempotent），
            # 不靠 entrypoint shell — Zeabur runtime log driver 不抓 PID 1 stdout，
            # uvicorn 是 main process，logger / print 一定進 Zeabur log。
            CMD ["sh", "-c", "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8080}"]
        env:
          ENVIRONMENT:
            default: prod
          PORT:
            default: "8080"
          DATABASE_URL:
            default: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
          SUPABASE_JWKS_URL:
            default: https://api.dawncast.app/auth/v1/.well-known/jwks.json
          SUPABASE_JWT_AUDIENCE:
            default: authenticated
          CORS_ALLOWED_ORIGINS:
            default: https://dawncast.app
          ADMIN_TOKEN:
            default: ""
          GENERATION_ENGINE:
            default: api_key
          FAILOVER_MODE:
            default: degrade
          API_KEY:
            default: ""
          API_BASE_URL:
            default: https://api.minimax.io/anthropic
          API_MODEL:
            default: MiniMax-M3
          R2_ACCOUNT_ID:
            default: ""
          R2_ACCESS_KEY_ID:
            default: ""
          R2_SECRET_ACCESS_KEY:
            default: ""
          R2_BUCKET:
            default: dawncast
          R2_ENDPOINT:
            default: ""
          TAVILY_API_KEY:
            default: ""
          APPLY_MIGRATIONS_ON_BOOT:
            default: "1"
          POSTGRES_USER:
            default: supabase_admin
          POSTGRES_HOST:
            default: db
          POSTGRES_PORT:
            default: "5432"
          POSTGRES_DB:
            default: postgres
        ports:
          - id: http
            port: 8080
            type: HTTP

    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # 4. Worker（常駐；Dockerfile.worker）
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    - name: worker
      template: GIT
      dependencies:
        - db
        - api
      spec:
        source:
          source: GITHUB
          repo: 1307825216
          branch: main
          rootDirectory: backend
          dockerfile: |
            # ── DawnCast Worker（常駐生成引擎）─────────────────────────────────────
            # 跑寫稿 + TTS + ffmpeg 合成/燒字幕。與 API 的關鍵差異：
            #   1. 裝 ffmpeg：audio.py / subtitles.py 直接 subprocess 呼叫。
            #   2. 裝中文字型 fonts-noto-cjk：少了它燒中文字幕會變一排方框（tofu）。
            # 無對外 port，CMD 常駐 poll 工作佇列。

            FROM python:3.12-slim AS builder

            COPY --from=ghcr.io/astral-sh/uv:latest /uv /uvx /bin/

            ENV UV_COMPILE_BYTECODE=1 \
                UV_LINK_MODE=copy \
                UV_PYTHON_DOWNLOADS=0

            WORKDIR /app

            COPY pyproject.toml uv.lock ./
            RUN uv sync --frozen --no-dev --no-install-project

            COPY app ./app
            COPY engine ./engine
            COPY shared ./shared
            RUN uv sync --frozen --no-dev

            FROM python:3.12-slim AS runtime

            RUN apt-get update \
                && apt-get install -y --no-install-recommends \
                    ffmpeg \
                    fonts-noto-cjk \
                    fonts-noto-color-emoji \
                && fc-cache -f \
                && rm -rf /var/lib/apt/lists/*

            RUN useradd --create-home --uid 10001 appuser
            WORKDIR /app

            ENV PATH="/app/.venv/bin:$PATH" \
                PYTHONUNBUFFERED=1 \
                PYTHONDONTWRITEBYTECODE=1

            COPY --from=builder --chown=appuser:appuser /app/.venv ./.venv
            COPY --from=builder --chown=appuser:appuser /app/app ./app
            COPY --from=builder --chown=appuser:appuser /app/engine ./engine
            COPY --from=builder --chown=appuser:appuser /app/shared ./shared
            COPY --chown=appuser:appuser deploy/healthcheck.py ./healthcheck.py

            COPY --chown=appuser:appuser scripts ./scripts

            USER appuser

            HEALTHCHECK --interval=60s --timeout=30s --start-period=30s --retries=3 \
                CMD python healthcheck.py || exit 1

            # ponytail: 啟動時由 engine/worker.py main() 跑 migrations（idempotent），
            # 不靠 entrypoint shell — Zeabur runtime log driver 不抓 PID 1 stdout，
            # worker 是 main process，logger 一定進 Zeabur log。
            CMD ["python", "-m", "engine.worker"]
        env:
          ENVIRONMENT:
            default: prod
          APP_TIMEZONE:
            default: Asia/Taipei
          DATABASE_URL:
            default: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
          GENERATION_ENGINE:
            default: api_key
          FAILOVER_MODE:
            default: degrade
          API_KEY:
            default: ""
          API_BASE_URL:
            default: https://api.minimax.io/anthropic
          API_MODEL:
            default: MiniMax-M3
          R2_ACCOUNT_ID:
            default: ""
          R2_ACCESS_KEY_ID:
            default: ""
          R2_SECRET_ACCESS_KEY:
            default: ""
          R2_BUCKET:
            default: dawncast
          R2_ENDPOINT:
            default: ""
          APPLY_MIGRATIONS_ON_BOOT:
            default: "1"
          POSTGRES_USER:
            default: supabase_admin
          POSTGRES_HOST:
            default: db
          POSTGRES_PORT:
            default: "5432"
          POSTGRES_DB:
            default: postgres
        # 無對外 port；常駐 process 由 Dockerfile.worker 的 CMD 啟動
